name: Button
category: Inputs
description: Use when offering a clickable action trigger such as submit, continue, or cancel — composed of an optional leading icon, a label, and an optional trailing icon aligned center.
structure:
  type: FRAME
  layoutMode: HORIZONTAL
  children:
    - icon?
    - label
    - icon?
defaultProps:
  layoutSizingHorizontal: HUG
  layoutSizingVertical: HUG
  primaryAxisAlignItems: CENTER
  counterAxisAlignItems: CENTER
  semantic: BUTTON
