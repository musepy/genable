name: Navigation Bar
description: Use when building the top-level app navigation row — composed of logo, navigation links, and actions with space-between distribution.
structure:
  type: FRAME
  layoutMode: HORIZONTAL
  children:
    - nav-logo
    - nav-links
    - nav-actions
defaultProps:
  primaryAxisAlignItems: SPACE_BETWEEN
  counterAxisAlignItems: CENTER
  layoutSizingHorizontal: FILL
  semantic: NAV_BAR
