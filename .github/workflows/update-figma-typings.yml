name: Update Figma Plugin Typings

# Checks @figma/plugin-typings weekly. If a newer version exists, bumps it,
# regenerates src/constants/figma-property-registry.ts, and opens a PR for
# human review. Never auto-merges. build.yml runs on the PR as the merge gate
# (typecheck + `extract-figma-props.ts --check` via build.js).

on:
  schedule:
    - cron: '0 4 * * 1'  # Mondays 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_update: ${{ steps.v.outputs.should_update }}
      current: ${{ steps.v.outputs.current }}
      latest: ${{ steps.v.outputs.latest }}
      branch: ${{ steps.v.outputs.branch }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Detect versions
        id: v
        run: |
          CURRENT=$(node -p "require('./package.json').devDependencies['@figma/plugin-typings'].replace(/[\^~]/,'')")
          LATEST=$(npm view @figma/plugin-typings version)
          BRANCH="auto/figma-typings-$LATEST"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST"   >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH"   >> "$GITHUB_OUTPUT"
          echo "Current: $CURRENT | Latest: $LATEST | Branch: $BRANCH"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "should_update=false" >> "$GITHUB_OUTPUT"
            echo "Up-to-date. Skipping."
            exit 0
          fi
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "should_update=false" >> "$GITHUB_OUTPUT"
            echo "Branch $BRANCH exists — PR likely open. Skipping."
            exit 0
          fi
          echo "should_update=true" >> "$GITHUB_OUTPUT"

  update:
    needs: check
    if: needs.check.outputs.should_update == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      - name: Upgrade typings
        run: npm install --save-dev "@figma/plugin-typings@${{ needs.check.outputs.latest }}"

      - name: Regenerate property registry
        id: extract
        continue-on-error: true
        run: npx tsx tools/extract-figma-props.ts 2>&1 | tee /tmp/extractor.log

      - name: Compose PR body
        run: |
          {
            echo "Automated bump of \`@figma/plugin-typings\`: \`${{ needs.check.outputs.current }}\` → \`${{ needs.check.outputs.latest }}\`."
            echo ""
            echo "## Registry regeneration"
            echo "- Status: \`${{ steps.extract.outcome }}\`"
            echo ""
            if [ "${{ steps.extract.outcome }}" != "success" ]; then
              echo "> ⚠️ Extractor did not succeed. Likely **unclassified properties** in new typings — they must be added to \`ROLE_MAP\` in \`tools/extract-figma-props.ts\`."
              echo ""
              echo "<details><summary>extractor output (tail)</summary>"
              echo ""
              echo '```'
              tail -40 /tmp/extractor.log
              echo '```'
              echo ""
              echo "</details>"
              echo ""
              echo "**To fix locally:**"
              echo '```sh'
              echo "gh pr checkout <this PR number>"
              echo "# 1. Add missing props to ROLE_MAP (tools/extract-figma-props.ts)"
              echo "# 2. Regenerate:"
              echo "npx tsx tools/extract-figma-props.ts"
              echo "git commit -am 'classify new typings props'"
              echo "git push"
              echo '```'
            fi
            echo ""
            echo "## Reviewer checklist"
            echo "- [ ] CI green (build.yml runs typecheck + extractor \`--check\`)"
            echo "- [ ] Skim Figma changelog: https://www.figma.com/plugin-docs/changelog/"
            echo "- [ ] Dev bridge E2E smoke test locally before merge"
            echo ""
            echo "> CI may not auto-run on bot-created PRs. If checks don't appear, push empty commit: \`git commit --allow-empty -m 'ci' && git push\`."
          } > /tmp/pr-body.md

      - name: Commit & push branch
        run: |
          git config user.name  'figma-typings-bot'
          git config user.email 'figma-typings-bot@users.noreply.github.com'
          git checkout -b "${{ needs.check.outputs.branch }}"
          git add package.json package-lock.json src/constants/figma-property-registry.ts
          if git diff --cached --quiet; then
            echo "No file changes detected. Aborting."
            exit 1
          fi
          git commit -m "chore(deps): bump @figma/plugin-typings ${{ needs.check.outputs.current }} → ${{ needs.check.outputs.latest }}"
          git push origin "${{ needs.check.outputs.branch }}"

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --head "${{ needs.check.outputs.branch }}" \
            --base main \
            --title "chore(deps): bump @figma/plugin-typings ${{ needs.check.outputs.current }} → ${{ needs.check.outputs.latest }}" \
            --body-file /tmp/pr-body.md
