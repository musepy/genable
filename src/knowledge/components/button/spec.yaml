name: Button
path: src/ui/components/Button.tsx
description: Interactive button component with multiple variants and states
category: input
props:
  - name: variant
    type: string
    description: Visual style of the button
    options: [primary, secondary, ghost, outline, destructive]
    default: primary
  - name: size
    type: string
    description: Vertical size of the button
    options: [sm, md, lg]
    default: md
  - name: children
    type: ReactNode
    description: Button text or content
    required: true
  - name: leftIcon
    type: ReactNode
    description: Icon displayed before text
  - name: disabled
    type: boolean
    description: Disables interaction
    default: false
variants:
  primary:
    description: Main action button with accent background
    props:
      background: var(--accent-9)
      color: white
  secondary:
    description: Subtle secondary action
    props:
      background: var(--gray-3)
      color: var(--gray-12)
figmaMapping:
  nodeType: FRAME
  layoutMode: HORIZONTAL
  defaultProps:
    borderRadius: 6
    primaryAxisAlignItems: CENTER
    counterAxisAlignItems: CENTER
codeSnippet: |
  <Button variant="primary" size="md" leftIcon={<Plus />}>New Design</Button>
