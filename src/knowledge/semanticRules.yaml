# Semantic Mapping Rules
# Maps semantic tokens to component search keywords and scoring logic.

rules:
  - token: BUTTON
    keywords: [button, btn, action]
    weight: 10
  - token: ICON_BUTTON
    keywords: [iconbutton, icon-button, btn-icon]
    weight: 12
  - token: AVATAR
    keywords: [avatar, profile, user-pic]
    weight: 15
  - token: CARD
    keywords: [card, panel, surface]
    weight: 8
  - token: BADGE
    keywords: [badge, tag, chip, label]
    weight: 10

settings:
  match_score: 10
  exact_match_bonus: 20
  min_threshold: 10
