<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Audit</title>
<style>
body { font: 14px/1.8 monospace; padding: 20px; max-width: 800px; }
table { border-collapse: collapse; width: 100%; }
th, td { padding: 4px 12px; text-align: left; border-bottom: 1px solid #eee; }
th { background: #f4f4f4; font-weight: 600; }
.bad { background: #fff0f0; font-weight: 600; }
.section { background: #e8e8e8; font-weight: 700; }
</style>
</head><body>
<h2>Alignment Audit — Target: TextL=22, TextR=318</h2>
<p>Loading ui-alignment-preview.html in hidden iframe...</p>
<table id="t"><tr><th>Element</th><th>BoxL</th><th>TextL</th><th>TextR</th><th>BoxR</th><th>L=22?</th><th>R=318?</th></tr></table>

<iframe id="f" src="ui-alignment-preview.html" style="width:340px;height:900px;position:absolute;left:-9999px"></iframe>

<script>
const iframe = document.getElementById('f');
iframe.onload = () => {
  setTimeout(() => {
    const doc = iframe.contentDocument;
    const table = document.getElementById('t');
    const T = 22, TR = 318;
    const T_LEFT = 10, T_RIGHT = 306;

    function addSection(name) {
      const tr = table.insertRow();
      tr.className = 'section';
      tr.innerHTML = `<td colspan=7>${name}</td>`;
    }

    function measure(el, label, frame) {
      const r = el.getBoundingClientRect();
      const fr = frame.getBoundingClientRect();
      const s = iframe.contentWindow.getComputedStyle(el);
      const padL = parseFloat(s.paddingLeft) || 0;
      const padR = parseFloat(s.paddingRight) || 0;
      const boxL = Math.round(r.left - fr.left);
      const boxR = Math.round(r.right - fr.left);
      const textL = Math.round(boxL + padL);
      const textR = Math.round(boxR - padR);
      const okL = textL === T ? '✓' : `✗ (${textL-T>0?'+':''}${textL-T})`;
      const okR = textR === TR ? '✓' : `✗ (${textR-TR>0?'+':''}${textR-TR})`;
      const bad = (textL !== T || textR !== TR);
      const tr = table.insertRow();
      if (bad) tr.className = 'bad';
      tr.innerHTML = `<td>${label}</td><td>${boxL}</td><td>${textL}</td><td>${textR}</td><td>${boxR}</td><td>${okL}</td><td>${okR}</td>`;
    }

    function measureAction(el, label, parent, frame) {
      const r = el.getBoundingClientRect();
      const fr = frame.getBoundingClientRect();
      const pr = parent.getBoundingClientRect();
      const s = iframe.contentWindow.getComputedStyle(parent);
      const boxR = Math.round(r.right - fr.left);
      const parentTextR = Math.round(pr.right - fr.left - (parseFloat(s.paddingRight)||0));
      const tr = table.insertRow();
      const flush = boxR <= parentTextR;
      if (!flush) tr.className = 'bad';
      tr.innerHTML = `<td>${label}</td><td>${Math.round(r.left-fr.left)}</td><td>—</td><td>—</td><td>${boxR}</td><td></td><td>${flush ? '✓ flush @'+boxR : '✗ gap '+(boxR-parentTextR)}</td>`;
    }

    // CHAT
    const cf = doc.getElementById('frame');
    addSection('CHAT');
    doc.querySelectorAll('#frame .user-msg').forEach((el,i) => measure(el, 'User msg '+i, cf));
    doc.querySelectorAll('#frame .status-block').forEach((el,i) => {
      measure(el, 'Status '+i, cf);
      el.querySelectorAll('.action').forEach(a => measureAction(a, '  → "'+a.textContent.trim()+'"', el, cf));
    });
    doc.querySelectorAll('#frame .tool-header').forEach((el,i) => measure(el, 'Tool hdr '+i, cf));
    doc.querySelectorAll('#frame .tool-item').forEach((el,i) => measure(el, 'Tool item '+i, cf));
    doc.querySelectorAll('#frame .canvas-block canvas').forEach((el,i) => {
      const r = el.getBoundingClientRect();
      const fr = cf.getBoundingClientRect();
      const bL = Math.round(r.left-fr.left);
      const bR = Math.round(r.right-fr.left);
      const tL = bL+T_LEFT, tR = bL+T_RIGHT;
      const tr = table.insertRow();
      if (tL!==T||tR!==TR) tr.className='bad';
      tr.innerHTML = `<td>Canvas ${i}</td><td>${bL}</td><td>${tL}</td><td>${tR}</td><td>${bR}</td><td>${tL===T?'✓':'✗ ('+(tL-T)+')'}</td><td>${tR===TR?'✓':'✗ ('+(tR-TR)+')'}</td>`;
    });
    const inp = doc.querySelector('#frame .input-textarea');
    if (inp) measure(inp, 'Input textarea', cf);

    // SETTINGS
    const sf = doc.getElementById('frame-settings');
    if (sf) {
      addSection('SETTINGS');
      sf.querySelectorAll('.settings-section-title').forEach((el,i) => measure(el, 'Sect title '+i, sf));
      sf.querySelectorAll('.settings-row').forEach((el,i) => measure(el, 'Row '+i, sf));
      sf.querySelectorAll('.settings-input').forEach((el,i) => measure(el, 'Input '+i, sf));
      sf.querySelectorAll('.dev-panel').forEach((el,i) => measure(el, 'Dev panel', sf));
      sf.querySelectorAll('.dev-btn').forEach((el,i) => measure(el, 'Dev btn '+i, sf));
      const ft = sf.querySelector('.settings-footer');
      if (ft) measure(ft, 'Footer', sf);
    }

    // ONBOARDING
    const of = doc.getElementById('frame-onboarding');
    if (of) {
      addSection('ONBOARDING');
      of.querySelectorAll('.onboarding-title').forEach(el => measure(el, 'OB title', of));
      of.querySelectorAll('.onboarding-desc').forEach(el => measure(el, 'OB desc', of));
      of.querySelectorAll('.onboarding-label').forEach((el,i) => measure(el, 'OB label '+i, of));
      of.querySelectorAll('.settings-row').forEach((el,i) => measure(el, 'OB row '+i, of));
      of.querySelectorAll('.settings-input').forEach(el => measure(el, 'OB input', of));
      of.querySelectorAll('.onboarding-btn').forEach(el => measure(el, 'OB button', of));
    }

    document.querySelector('p').textContent = 'Audit complete. Red rows = misaligned.';
  }, 2000);
};
</script>
</body></html>
