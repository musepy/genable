<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Canvas Fade: destination-out vs probe</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font: 13px/1.6 Inter, sans-serif; padding: 20px; background: var(--bg); color: var(--fg); }
:root { --bg: #ffffff; --fg: #1a1a1a; --secondary: #6b6b6b; --gray-1: #fcfcfc; }
:root.dark { --bg: #111111; --fg: #eeeeee; --secondary: #888; --gray-1: #111111; }

.row { display: flex; gap: 16px; margin-bottom: 16px; }
.col { flex: 1; }
.label { font-size: 11px; font-weight: 600; color: var(--secondary); margin-bottom: 4px; }
canvas { display: block; border-radius: 6px; }
button { padding: 6px 14px; border: 1px solid rgba(128,128,128,.3); border-radius: 8px; cursor: pointer; font: inherit; background: var(--bg); color: var(--fg); }
.controls { margin-bottom: 16px; display: flex; gap: 8px; align-items: center; }
.result { font: 12px/1.6 monospace; margin-top: 12px; padding: 12px; background: rgba(128,128,128,.06); border-radius: 8px; }
.pass { color: #16a34a; } .fail { color: #dc2626; font-weight: 600; }
</style>
</head><body>

<h2>Canvas Fade Comparison</h2>
<div class="controls">
  <button onclick="toggle()">Toggle Theme</button>
  <button onclick="runAudit()">Run Audit</button>
  <span id="theme">light</span>
</div>

<div class="row">
  <div class="col">
    <div class="label">A: probe-based (current — needs bg color)</div>
    <canvas id="canvasA" width="316" height="160"></canvas>
  </div>
  <div class="col">
    <div class="label">B: destination-out (theme-independent)</div>
    <canvas id="canvasB" width="316" height="160"></canvas>
  </div>
</div>

<div class="row">
  <div class="col">
    <div class="label">C: Full chat block — fold + "click to expand" below</div>
    <canvas id="canvasC" width="316" height="130"></canvas>
    <div style="text-align:center;font-size:10px;color:var(--secondary);padding:4px 0;cursor:pointer">click to expand</div>
  </div>
  <div class="col">
    <div class="label">D: Scroll container edges (top + bottom fade)</div>
    <div style="height:160px;overflow-y:auto;border-radius:6px;border:1px solid rgba(128,128,128,.15);position:relative" id="scrollD">
      <canvas id="canvasD" width="316" height="400"></canvas>
    </div>
  </div>
</div>

<div class="result" id="result"></div>

<script>
const W = 316, H = 160, FADE = 32;
const FONT = 'Inter, -apple-system, sans-serif';

function resolveColor(varName) {
  const probe = document.createElement('div');
  probe.style.color = `var(${varName})`;
  document.body.appendChild(probe);
  const val = getComputedStyle(probe).color;
  document.body.removeChild(probe);
  return val;
}

function parseRgb(str) {
  const m = str.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
  return m ? { r: +m[1], g: +m[2], b: +m[3] } : null;
}

function drawContent(ctx, w, h) {
  const fg = resolveColor('--fg');
  const secondary = resolveColor('--secondary');

  ctx.font = `600 15px ${FONT}`;
  ctx.fillStyle = fg;
  ctx.fillText('Design Overview', 10, 22);

  ctx.font = `400 12px ${FONT}`;
  ctx.fillStyle = fg;
  const lines = [
    'A modern login page with email and password.',
    'Brand color #3B82F6 with clean background.',
    '1. Header with logo and navigation',
    '2. Email input field with validation',
    '3. Password field with show/hide toggle',
    '4. Submit button with loading state',
    '5. Social login: Google, Apple, GitHub',
    '6. Footer with terms and privacy links',
  ];
  lines.forEach((line, i) => {
    ctx.fillStyle = i < 2 ? fg : secondary;
    ctx.fillText(line, 10, 44 + i * 18);
  });
}

// Method A: probe-based fade (current approach)
function renderA() {
  const canvas = document.getElementById('canvasA');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  drawContent(ctx, W, H);

  // Probe bg color for gradient
  const bgStr = resolveColor('--bg');
  const bg = parseRgb(bgStr) || { r: 255, g: 255, b: 255 };
  const grad = ctx.createLinearGradient(0, H - FADE, 0, H);
  grad.addColorStop(0, `rgba(${bg.r},${bg.g},${bg.b},0)`);
  grad.addColorStop(0.6, `rgba(${bg.r},${bg.g},${bg.b},0.85)`);
  grad.addColorStop(1, `rgba(${bg.r},${bg.g},${bg.b},1)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, H - FADE, W, FADE);
}

// Method B: destination-out (theme-independent)
function renderB() {
  const canvas = document.getElementById('canvasB');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  drawContent(ctx, W, H);

  // Erase bottom pixels — no need to know bg color
  ctx.globalCompositeOperation = 'destination-out';
  const grad = ctx.createLinearGradient(0, H - FADE, 0, H);
  grad.addColorStop(0, 'rgba(0,0,0,0)');   // keep
  grad.addColorStop(0.6, 'rgba(0,0,0,0.85)');
  grad.addColorStop(1, 'rgba(0,0,0,1)');   // erase
  ctx.fillStyle = grad;
  ctx.fillRect(0, H - FADE, W, FADE);
  ctx.globalCompositeOperation = 'source-over';
}

// Method C: fold block with "click to expand" below (not overlapping)
function renderC() {
  const canvas = document.getElementById('canvasC');
  const ctx = canvas.getContext('2d');
  const h = 130;
  ctx.clearRect(0, 0, W, h);
  drawContent(ctx, W, h);

  // Bottom fade via destination-out
  ctx.globalCompositeOperation = 'destination-out';
  const grad = ctx.createLinearGradient(0, h - 24, 0, h);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,1)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, h - 24, W, 24);
  ctx.globalCompositeOperation = 'source-over';
}

// Method D: scroll container with top+bottom fade
function renderD() {
  const canvas = document.getElementById('canvasD');
  const ctx = canvas.getContext('2d');
  const h = 400;
  ctx.clearRect(0, 0, W, h);

  // Draw lots of content
  const fg = resolveColor('--fg');
  ctx.font = `600 14px ${FONT}`;
  ctx.fillStyle = fg;
  ctx.fillText('Scrollable Content', 10, 22);
  ctx.font = `400 12px ${FONT}`;
  for (let i = 0; i < 22; i++) {
    ctx.fillStyle = fg;
    ctx.fillText(`${i + 1}. Content line item number ${i + 1}`, 10, 44 + i * 18);
  }

  // Top fade
  ctx.globalCompositeOperation = 'destination-out';
  const topGrad = ctx.createLinearGradient(0, 0, 0, 20);
  topGrad.addColorStop(0, 'rgba(0,0,0,1)');
  topGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = topGrad;
  ctx.fillRect(0, 0, W, 20);

  // Bottom fade
  const botGrad = ctx.createLinearGradient(0, h - 20, 0, h);
  botGrad.addColorStop(0, 'rgba(0,0,0,0)');
  botGrad.addColorStop(1, 'rgba(0,0,0,1)');
  ctx.fillStyle = botGrad;
  ctx.fillRect(0, h - 20, W, 20);
  ctx.globalCompositeOperation = 'source-over';
}

function renderAll() {
  renderA(); renderB(); renderC(); renderD();
}

// --- Pixel audit ---
function samplePixel(canvasId, x, y) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  const px = ctx.getImageData(x, y, 1, 1).data;
  return { r: px[0], g: px[1], b: px[2], a: px[3] };
}

function runAudit() {
  const isDark = document.documentElement.classList.contains('dark');
  const results = [];

  // Test both methods at fade zone
  const tests = [
    { canvas: 'canvasA', label: 'A (probe)', pts: [
      { name: 'top (content)', x: 50, y: 20 },
      { name: 'fade start', x: 50, y: H - FADE },
      { name: 'fade mid', x: 50, y: H - FADE/2 },
      { name: 'fade end', x: 50, y: H - 2 },
    ]},
    { canvas: 'canvasB', label: 'B (dest-out)', pts: [
      { name: 'top (content)', x: 50, y: 20 },
      { name: 'fade start', x: 50, y: H - FADE },
      { name: 'fade mid', x: 50, y: H - FADE/2 },
      { name: 'fade end', x: 50, y: H - 2 },
    ]},
  ];

  let html = `<strong>${isDark ? 'DARK' : 'LIGHT'} MODE</strong><br><br>`;

  for (const t of tests) {
    html += `<strong>${t.label}</strong><br>`;
    for (const pt of t.pts) {
      const px = samplePixel(t.canvas, pt.x, pt.y);
      const isEnd = pt.name.includes('end');

      let pass;
      if (t.label.includes('dest-out') && isEnd) {
        // destination-out: fade end should be transparent (a ≈ 0)
        pass = px.a < 20;
        html += `  ${pt.name}: rgba(${px.r},${px.g},${px.b},${px.a}) — alpha=${px.a} ${pass ? '<span class="pass">✓ transparent</span>' : '<span class="fail">✗ not transparent</span>'}<br>`;
      } else if (t.label.includes('probe') && isEnd) {
        // probe: fade end should match bg color (opaque)
        const bgPx = isDark ? { r: 17, g: 17, b: 17 } : { r: 255, g: 255, b: 255 };
        pass = px.a > 240 && Math.abs(px.r - bgPx.r) < 15;
        html += `  ${pt.name}: rgba(${px.r},${px.g},${px.b},${px.a}) ${pass ? '<span class="pass">✓ matches bg</span>' : '<span class="fail">✗ wrong color</span>'}<br>`;
      } else {
        html += `  ${pt.name}: rgba(${px.r},${px.g},${px.b},${px.a})<br>`;
      }
    }
    html += '<br>';
  }

  // Key advantage: destination-out works WITHOUT knowing bg color
  html += '<strong>Comparison:</strong><br>';
  html += '  A (probe): needs bg color probe element, fails if var() doesn\'t resolve<br>';
  html += '  B (dest-out): <span class="pass">theme-independent, no probes needed</span><br>';

  document.getElementById('result').innerHTML = html;
}

let dark = false;
function toggle() {
  dark = !dark;
  document.documentElement.classList.toggle('dark', dark);
  document.body.style.background = dark ? '#111' : '#fff';
  document.getElementById('theme').textContent = dark ? 'dark' : 'light';
  renderAll();
  runAudit();
}

renderAll();
runAudit();

// === Full automated audit: both themes, all methods ===
function runFullAudit() {
  const allRows = [];

  function auditTheme(themeName) {
    const isDark = themeName === 'dark';
    if (isDark) { document.documentElement.classList.add('dark'); document.body.style.background = '#111'; }
    else { document.documentElement.classList.remove('dark'); document.body.style.background = ''; }
    renderAll();

    const methods = [
      { id: 'canvasA', label: 'Probe fade' },
      { id: 'canvasB', label: 'Dest-out fade' },
      { id: 'canvasC', label: 'Fold block' },
    ];

    allRows.push({ section: `${themeName.toUpperCase()} MODE` });

    for (const m of methods) {
      const ctx = document.getElementById(m.id).getContext('2d');
      const h = parseInt(document.getElementById(m.id).height);

      // Content area: should have visible pixels (alpha > 200)
      const topPx = ctx.getImageData(50, 18, 1, 1).data;
      const topOk = topPx[3] > 200;
      allRows.push({ label: `${m.label} — content top`, alpha: topPx[3], pass: topOk,
        expect: 'alpha > 200 (visible)', rgb: `${topPx[0]},${topPx[1]},${topPx[2]}` });

      // Fade end: should be transparent for dest-out, bg-matched for probe
      const endPx = ctx.getImageData(50, h - 2, 1, 1).data;
      let endOk;
      if (m.id === 'canvasA') {
        // Probe: opaque, matches bg
        const bgTarget = isDark ? 17 : 255;
        endOk = endPx[3] > 230 && Math.abs(endPx[0] - bgTarget) < 20;
      } else {
        // Dest-out: transparent
        endOk = endPx[3] < 30;
      }
      allRows.push({ label: `${m.label} — fade end`, alpha: endPx[3], pass: endOk,
        expect: m.id === 'canvasA' ? 'opaque, matches bg' : 'alpha < 30 (transparent)',
        rgb: `${endPx[0]},${endPx[1]},${endPx[2]}` });

      // Mid fade: should be partially transparent (for dest-out) or partially bg (for probe)
      const midY = h - Math.floor((h < 140 ? 12 : 16));
      const midPx = ctx.getImageData(50, midY, 1, 1).data;
      const midOk = midPx[3] > 10 && midPx[3] < 250; // partially faded
      allRows.push({ label: `${m.label} — fade mid`, alpha: midPx[3], pass: midOk,
        expect: 'partially faded (10 < alpha < 250)',
        rgb: `${midPx[0]},${midPx[1]},${midPx[2]}` });
    }

    // Scroll container (D) — top and bottom should be transparent
    const ctxD = document.getElementById('canvasD').getContext('2d');
    const topD = ctxD.getImageData(50, 2, 1, 1).data;
    allRows.push({ label: 'Scroll top fade', alpha: topD[3], pass: topD[3] < 30,
      expect: 'alpha < 30 (transparent)', rgb: `${topD[0]},${topD[1]},${topD[2]}` });
    const botD = ctxD.getImageData(50, 398, 1, 1).data;
    allRows.push({ label: 'Scroll bottom fade', alpha: botD[3], pass: botD[3] < 30,
      expect: 'alpha < 30 (transparent)', rgb: `${botD[0]},${botD[1]},${botD[2]}` });
  }

  auditTheme('light');
  auditTheme('dark');

  // Reset to light
  document.documentElement.classList.remove('dark');
  document.body.style.background = '';
  renderAll();

  // Render table
  let html = '<h3>Fade Audit — Pixel Sampling</h3>';
  html += '<table style="width:100%;border-collapse:collapse;font:12px/1.6 monospace">';
  html += '<tr style="background:rgba(0,0,0,.04)"><th style="text-align:left;padding:4px 8px">Element</th><th>RGBA</th><th>Alpha</th><th>Expected</th><th>Result</th></tr>';

  let allPass = true;
  for (const r of allRows) {
    if (r.section) {
      html += `<tr><td colspan=5 style="padding:8px;font-weight:700;background:rgba(0,0,0,.06)">${r.section}</td></tr>`;
      continue;
    }
    if (!r.pass) allPass = false;
    const cls = r.pass ? 'pass' : 'fail';
    html += `<tr class="${cls}" style="border-bottom:1px solid rgba(0,0,0,.05)">`;
    html += `<td style="padding:3px 8px">${r.label}</td>`;
    html += `<td style="padding:3px 8px">rgba(${r.rgb},${r.alpha})</td>`;
    html += `<td style="padding:3px 8px;text-align:center">${r.alpha}</td>`;
    html += `<td style="padding:3px 8px">${r.expect}</td>`;
    html += `<td style="padding:3px 8px">${r.pass ? '✓' : '✗'}</td>`;
    html += '</tr>';
  }
  html += '</table>';
  html += `<p style="margin-top:8px;font-weight:600">${allPass ? '<span class="pass">✓ ALL PASS</span>' : '<span class="fail">✗ FAILURES DETECTED</span>'}</p>`;

  html += '<h3 style="margin-top:16px">Method Comparison</h3>';
  html += '<table style="width:100%;border-collapse:collapse;font:12px/1.6 sans-serif">';
  html += '<tr style="background:rgba(0,0,0,.04)"><th style="text-align:left;padding:4px 8px">Property</th><th>Probe (A)</th><th>Dest-out (B)</th></tr>';
  const cmp = [
    ['Needs bg color', '✗ Yes (probe element)', '✓ No'],
    ['Theme-independent', '✗ No', '✓ Yes'],
    ['DOM operations', '✗ 1 probe per render', '✓ Zero'],
    ['Dark mode risk', '✗ Wrong fallback → gray band', '✓ None'],
    ['Canvas alpha at fade end', 'Opaque (bg color)', 'Transparent (a=0)'],
  ];
  for (const [prop, a, b] of cmp) {
    html += `<tr style="border-bottom:1px solid rgba(0,0,0,.05)"><td style="padding:3px 8px">${prop}</td><td style="padding:3px 8px">${a}</td><td style="padding:3px 8px">${b}</td></tr>`;
  }
  html += '</table>';

  document.getElementById('result').innerHTML = html;
}

// Auto-run on load
setTimeout(runFullAudit, 300);
</script>
</body></html>
