<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Timeline Dashboard</title>
  <style>
    /* ===== Theme Variables ===== */
    :root,
    [data-theme="dark"] {
      --bg-body: #111;
      --bg-header: #1a1a1a;
      --bg-card: #1a1a1a;
      --bg-input: #2a2a2a;
      --bg-hover: #333;
      --bg-code: #1a1a1a;
      --bg-tool-body: #151515;
      --bg-live-item: #1f1f1f;
      --bg-detail-hover: #222;
      --bg-idx: #2a2a2a;
      --bg-bar-live: #2a2a2a;

      --border-header: #333;
      --border-card: #2a2a2a;
      --border-input: #444;
      --border-row: #1f1f1f;
      --border-detail: #222;
      --border-tooltip: #555;
      --border-bar-live: #555;

      --text-primary: #e0e0e0;
      --text-heading: #fff;
      --text-secondary: #aaa;
      --text-muted: #888;
      --text-dimmed: #666;
      --text-code: #b0b0b0;
      --text-final: #ccc;
      --text-status: #999;
      --text-empty: #666;
      --text-bar: #fff;

      --tooltip-bg: #333;
      --tooltip-text: #e0e0e0;

      --dot-idle: #666;

      --theme-toggle-icon: '☀️';
    }

    [data-theme="light"] {
      --bg-body: #f5f6f8;
      --bg-header: #fff;
      --bg-card: #fff;
      --bg-input: #fff;
      --bg-hover: #e8eaed;
      --bg-code: #f5f5f5;
      --bg-tool-body: #fafbfc;
      --bg-live-item: #f5f6f8;
      --bg-detail-hover: #f5f6f8;
      --bg-idx: #eef0f2;
      --bg-bar-live: #e8eaed;

      --border-header: #e2e4e8;
      --border-card: #e2e4e8;
      --border-input: #d0d4da;
      --border-row: #eef0f2;
      --border-detail: #eef0f2;
      --border-tooltip: #d0d4da;
      --border-bar-live: #bbb;

      --text-primary: #2c2c2c;
      --text-heading: #111;
      --text-secondary: #555;
      --text-muted: #777;
      --text-dimmed: #999;
      --text-code: #444;
      --text-final: #333;
      --text-status: #777;
      --text-empty: #aaa;
      --text-bar: #fff;

      --tooltip-bg: #fff;
      --tooltip-text: #333;

      --dot-idle: #bbb;

      --theme-toggle-icon: '🌙';
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background .25s, color .25s;
    }
    code, pre, .mono {
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', monospace;
    }

    /* Header */
    .header {
      background: var(--bg-header);
      border-bottom: 1px solid var(--border-header);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background .25s, border-color .25s;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-heading);
      white-space: nowrap;
    }
    .header-spacer { flex: 1; }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mode-btn {
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      color: var(--text-secondary);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all .15s;
    }
    .mode-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }
    .mode-btn:hover:not(.active) { background: var(--bg-hover); color: var(--text-heading); }
    select, input[type="text"] {
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      color: var(--text-primary);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      transition: background .15s, border-color .15s, color .15s;
    }
    select:focus, input[type="text"]:focus { border-color: #3b82f6; }
    select { max-width: 280px; }
    input[type="text"] { width: 400px; }
    .btn {
      background: #3b82f6;
      border: none;
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background .15s;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border-input);
      color: var(--text-secondary);
    }
    .btn-ghost:hover { background: var(--bg-input); color: var(--text-heading); }
    .btn-danger { background: #ef4444; }
    .btn-danger:hover { background: #dc2626; }

    /* Theme toggle */
    .theme-toggle {
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all .15s;
      flex-shrink: 0;
    }
    .theme-toggle:hover {
      background: var(--bg-hover);
      border-color: #3b82f6;
    }

    /* Main document — single reading column */
    .doc {
      max-width: 1024px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }

    /* Mode panels */
    .mode-panel { display: none; align-items: center; gap: 8px; }
    .mode-panel.active { display: flex; }

    /* Live status */
    .live-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-status);
    }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--dot-idle);
    }
    .live-dot.connected { background: #22c55e; animation: pulse 2s infinite; }
    .live-dot.running { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 16px;
      transition: background .25s, border-color .25s;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dimmed);
      margin-bottom: 12px;
    }

    /* Overview — compact horizontal strip */
    .overview-stats {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .overview-stats .stat-sep {
      color: var(--text-dimmed);
      opacity: 0.6;
    }
    .overview-stats .stat-val {
      font-weight: 600;
      color: var(--text-primary);
    }
    .overview-stats .stat-val.model { color: #a78bfa; }
    .overview-stats .stat-val.duration { color: #f59e0b; }
    .overview-stats .stat-val.tools { color: #22c55e; }
    .overview-stats .stat-val.errors { color: #ef4444; }
    .overview-stats .stat-val.iterations { color: #3b82f6; }

    /* Screenshot + final text (footer, stacked naturally) */
    .screenshot-img {
      display: block;
      max-width: 800px;
      width: 100%;
      height: auto;
      border-radius: 6px;
      border: 1px solid var(--border-card);
    }
    .final-text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-final);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Overview thumbnail (right side of overview strip) */
    .overview-strip {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .overview-main {
      flex: 1;
      min-width: 0;
    }
    .overview-prompt {
      font-size: 14px;
      color: var(--text-heading);
      margin-bottom: 10px;
      line-height: 1.5;
      word-break: break-word;
    }
    .overview-prompt.clamp {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      cursor: pointer;
    }
    .overview-thumb {
      flex-shrink: 0;
      width: 80px;
      height: 60px;
      border-radius: 4px;
      border: 1px solid var(--border-card);
      object-fit: cover;
      cursor: pointer;
      background: var(--bg-input);
    }
    .overview-thumb.hidden { display: none; }

    /* Inline LLM request block inside iteration separator */
    .evlog-iter-llm-btn {
      display: inline-flex;
      align-items: center;
      margin-left: 8px;
      padding: 1px 8px;
      background: var(--bg-card);
      border: 1px solid var(--border-input);
      border-radius: 3px;
      color: #3b82f6;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      user-select: none;
    }
    .evlog-iter-llm-btn:hover { background: var(--bg-hover); }
    .evlog-iter-llm-btn.active { background: rgba(59,130,246,.15); border-color: #3b82f6; }
    .evlog-iter-llm-block {
      padding: 10px 14px 12px 34px;
      background: var(--bg-tool-body);
      border-bottom: 1px solid var(--border-row);
      border-left: 3px solid #3b82f6;
      font-size: 11px;
      color: var(--text-primary);
    }
    .evlog-iter-llm-head {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', monospace;
    }
    .evlog-iter-llm-msgs {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', monospace;
    }
    .evlog-iter-llm-msg {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .evlog-iter-llm-role {
      width: 52px;
      font-weight: 600;
      text-transform: lowercase;
      font-size: 11px;
    }
    .evlog-iter-llm-role.system { color: #f59e0b; }
    .evlog-iter-llm-role.user { color: #3b82f6; }
    .evlog-iter-llm-role.model { color: #a855f7; }
    .evlog-iter-llm-role.tool { color: #22c55e; }
    .evlog-iter-llm-len { color: var(--text-muted); font-size: 11px; }
    .evlog-iter-llm-flag { color: var(--text-dimmed); font-size: 10px; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-empty);
      font-size: 13px;
    }
    .empty-state .icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    /* Live tool list */
    .live-tools {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .live-tool-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--bg-live-item);
      border-radius: 4px;
      font-size: 12px;
      animation: fadeIn .3s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .live-tool-item .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .live-tool-item .dot.ok { background: #22c55e; }
    .live-tool-item .dot.err { background: #ef4444; }

    /* ===== Event Log ===== */
    .evlog-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 11px;
    }
    .evlog-toolbar label.evlog-chk {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 3px;
      cursor: pointer;
      user-select: none;
      color: var(--text-secondary);
    }
    .evlog-toolbar label.evlog-chk input {
      margin: 0;
      cursor: pointer;
    }
    .evlog-toolbar .evlog-spacer {
      flex: 1 1 auto;
      min-width: 8px;
    }
    .evlog-toolbar button.evlog-btn {
      padding: 4px 10px;
      background: var(--bg-card);
      border: 1px solid var(--border-input);
      border-radius: 3px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
    }
    .evlog-toolbar button.evlog-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .evlog-toolbar input.evlog-search {
      padding: 4px 8px;
      background: var(--bg-card);
      border: 1px solid var(--border-input);
      border-radius: 3px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 11px;
      min-width: 180px;
    }
    .evlog-feed {
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', monospace;
      font-size: 12px;
      border: 1px solid var(--border-card);
      border-radius: 4px;
      background: var(--bg-code);
    }
    .evlog-iter-sep {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--bg-input);
      border-bottom: 1px solid var(--border-row);
      border-top: 1px solid var(--border-row);
      font-size: 11px;
      color: var(--text-dimmed);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      user-select: none;
      cursor: pointer;
    }
    .evlog-iter-sep:first-child { border-top: none; }
    .evlog-iter-sep .evlog-iter-toggle {
      display: inline-block;
      width: 12px;
      color: var(--text-muted);
      transition: transform .15s;
    }
    .evlog-iter-sep.folded .evlog-iter-toggle { transform: rotate(-90deg); }
    .evlog-iter-sep .evlog-iter-count {
      margin-left: auto;
      color: var(--text-muted);
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
    }
    .evlog-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      border-left: 3px solid var(--border-card);
      border-bottom: 1px solid var(--border-row);
      cursor: pointer;
      transition: background .1s;
    }
    .evlog-row:hover { background: var(--bg-hover); }
    .evlog-row[data-type="user"]       { border-left-color: #3b82f6; }
    .evlog-row[data-type="agent-text"] { border-left-color: #a855f7; }
    .evlog-row[data-type="tool-ok"]    { border-left-color: #22c55e; }
    .evlog-row[data-type="tool-cap"]   { border-left-color: #f59e0b; }
    .evlog-row[data-type="tool-err"]   { border-left-color: #ef4444; }
    .evlog-row[data-type="hook"]       { border-left-color: #eab308; }
    .evlog-row[data-type="turn-end"]   { border-left-color: var(--text-dimmed); }
    .evlog-icon {
      width: 18px;
      flex-shrink: 0;
      text-align: center;
      font-size: 12px;
    }
    .evlog-iter-badge {
      display: inline-block;
      min-width: 32px;
      padding: 1px 6px;
      background: var(--bg-idx);
      color: var(--text-muted);
      border-radius: 2px;
      font-size: 10px;
      text-align: center;
      flex-shrink: 0;
    }
    .evlog-type-chip {
      display: inline-block;
      min-width: 70px;
      padding: 1px 6px;
      border-radius: 2px;
      font-size: 10px;
      text-align: center;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-weight: 600;
    }
    .evlog-type-chip[data-type="user"]       { background: rgba(59,130,246,.15); color: #3b82f6; }
    .evlog-type-chip[data-type="agent-text"] { background: rgba(168,85,247,.15); color: #a855f7; }
    .evlog-type-chip[data-type="tool-ok"]    { background: rgba(34,197,94,.15); color: #22c55e; }
    .evlog-type-chip[data-type="tool-cap"]   { background: rgba(245,158,11,.15); color: #f59e0b; }
    .evlog-type-chip[data-type="tool-err"]   { background: rgba(239,68,68,.15); color: #ef4444; }
    .evlog-type-chip[data-type="hook"]       { background: rgba(234,179,8,.15); color: #eab308; }
    .evlog-type-chip[data-type="turn-end"]   { background: var(--bg-idx); color: var(--text-dimmed); }
    .evlog-preview {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-primary);
    }
    .evlog-dur {
      flex-shrink: 0;
      color: var(--text-muted);
      font-size: 11px;
    }
    .evlog-raw {
      display: none;
      margin: 0;
      padding: 10px 14px 10px 34px;
      background: var(--bg-tool-body);
      border-bottom: 1px solid var(--border-row);
      border-left: 3px solid var(--border-card);
      color: var(--text-code);
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
    }
    .evlog-raw.open { display: block; }
    .evlog-empty {
      padding: 30px;
      text-align: center;
      color: var(--text-empty);
      font-size: 12px;
    }

    /* ===== ID cross-reference (lineage tracing) ===== */
    .evlog-id-ref {
      cursor: pointer;
      padding: 0 2px;
      border-radius: 3px;
      background: transparent;
      border-bottom: 1px dashed var(--text-dimmed);
      transition: background .12s, border-color .12s;
    }
    .evlog-id-ref:hover {
      background: rgba(234, 179, 8, 0.15);
      border-bottom-color: #eab308;
    }
    .evlog-id-ref.active {
      background: rgba(234, 179, 8, 0.25);
      border-bottom-color: #eab308;
      border-bottom-style: solid;
    }
    .evlog-row.evlog-id-highlight-producer {
      background: rgba(34, 197, 94, 0.12) !important;
      box-shadow: inset 3px 0 0 #22c55e;
    }
    .evlog-row.evlog-id-highlight {
      background: rgba(234, 179, 8, 0.10) !important;
      box-shadow: inset 3px 0 0 #eab308;
    }
    /* The producing/consuming row emphasizes its matching id spans */
    .evlog-row.evlog-id-highlight-producer .evlog-id-ref.active,
    .evlog-row.evlog-id-highlight .evlog-id-ref.active {
      background: rgba(234, 179, 8, 0.35);
    }
    [data-theme="light"] .evlog-row.evlog-id-highlight-producer {
      background: rgba(34, 197, 94, 0.18) !important;
    }
    [data-theme="light"] .evlog-row.evlog-id-highlight {
      background: rgba(234, 179, 8, 0.18) !important;
    }

    /* Sticky banner shown while a node id is highlighted */
    .evlog-id-banner {
      position: sticky;
      top: 53px;
      z-index: 90;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      min-height: 36px;
      background: rgba(234, 179, 8, 0.12);
      border-top: 1px solid #eab308;
      border-bottom: 1px solid #eab308;
      font-size: 12px;
      color: var(--text-primary);
      backdrop-filter: blur(6px);
    }
    [data-theme="light"] .evlog-id-banner {
      background: rgba(234, 179, 8, 0.18);
    }
    .evlog-id-banner-label {
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .evlog-id-banner-id {
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(234, 179, 8, 0.2);
      border: 1px solid #eab308;
      color: var(--text-heading);
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', monospace;
      font-size: 12px;
    }
    .evlog-id-banner-sep {
      color: var(--text-dimmed);
    }
    .evlog-id-banner-meta {
      color: var(--text-secondary);
      font-size: 11px;
    }
    .evlog-id-banner-close {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border-input);
      color: var(--text-secondary);
      width: 22px;
      height: 22px;
      line-height: 1;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      padding: 0;
      transition: background .12s, color .12s;
    }
    .evlog-id-banner-close:hover {
      background: var(--bg-hover);
      color: var(--text-heading);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Agent Timeline</h1>
    <div class="controls">
      <button class="mode-btn active" data-mode="history" onclick="switchMode('history')">History</button>
      <button class="mode-btn" data-mode="live" onclick="switchMode('live')">Live</button>
    </div>
    <div class="header-spacer"></div>

    <!-- History controls -->
    <div class="mode-panel active" id="history-controls">
      <select id="recording-select" onchange="loadRecording(this.value)">
        <option value="">-- select recording --</option>
      </select>
      <button class="btn btn-ghost" onclick="refreshRecordings()">Refresh</button>
    </div>

    <!-- Live controls -->
    <div class="mode-panel" id="live-controls">
      <input type="text" id="live-prompt" placeholder="Enter a design prompt..." onkeydown="if(event.key==='Enter')sendLivePrompt()">
      <button class="btn" id="live-send-btn" onclick="sendLivePrompt()">Send</button>
      <button class="btn btn-danger" id="live-stop-btn" style="display:none" onclick="stopLive()">Stop</button>
      <div class="live-status" id="live-status">
        <div class="live-dot" id="live-dot"></div>
        <span id="live-status-text">Idle</span>
      </div>
    </div>

    <!-- Theme toggle -->
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark"></button>
  </div>

  <main class="doc">
    <!-- ID cross-reference banner (visible only while highlighting) -->
    <div id="evlog-id-banner" class="evlog-id-banner" style="display:none">
      <span class="evlog-id-banner-label">Highlighting</span>
      <code class="evlog-id-banner-id" id="evlog-id-banner-id">1:1</code>
      <span class="evlog-id-banner-sep">&middot;</span>
      <span class="evlog-id-banner-meta" id="evlog-id-banner-meta"></span>
      <button class="evlog-id-banner-close" type="button" id="evlog-id-banner-close" aria-label="Clear highlight">&times;</button>
    </div>

    <!-- Overview: compact strip with prompt + stats + screenshot thumb -->
    <div class="card" id="overview-card" style="display:none">
      <div class="overview-strip">
        <div class="overview-main">
          <div class="overview-prompt clamp" id="overview-prompt" title="Click to toggle full prompt"></div>
          <div class="overview-stats" id="overview-stats"></div>
        </div>
        <img id="overview-thumb" class="overview-thumb hidden" alt="Screenshot thumb" title="Click to jump to full screenshot">
      </div>
    </div>

    <!-- Live tool feed (live mode only) -->
    <div class="card" id="live-feed-card" style="display:none">
      <div class="card-title">Live Tool Calls</div>
      <div class="live-tools" id="live-tools"></div>
    </div>

    <!-- Event Log — primary reading view -->
    <div class="card" id="evlog-card" style="display:none">
      <div class="card-title">Event Log</div>
      <div class="evlog-toolbar" id="evlog-toolbar">
        <label class="evlog-chk"><input type="checkbox" data-evlog-type="user" checked> user</label>
        <label class="evlog-chk"><input type="checkbox" data-evlog-type="agent-text" checked> agent</label>
        <label class="evlog-chk"><input type="checkbox" data-evlog-type="tool-ok" checked> tool-ok</label>
        <label class="evlog-chk"><input type="checkbox" data-evlog-type="tool-err" checked> tool-err</label>
        <label class="evlog-chk"><input type="checkbox" data-evlog-type="hook" checked> hook</label>
        <label class="evlog-chk"><input type="checkbox" data-evlog-type="turn-end" checked> turn</label>
        <button class="evlog-btn" id="evlog-only-errors" type="button">only errors</button>
        <button class="evlog-btn" id="evlog-only-hooks" type="button">only hooks</button>
        <button class="evlog-btn" id="evlog-reset" type="button">reset</button>
        <span class="evlog-spacer"></span>
        <input class="evlog-search" id="evlog-search" type="text" placeholder="search preview...">
      </div>
      <div class="evlog-feed" id="evlog-feed"></div>
    </div>

    <!-- Final text (agent response) -->
    <div class="card" id="finaltext-card" style="display:none">
      <div class="card-title">Agent Response</div>
      <div class="final-text" id="final-text"></div>
    </div>

    <!-- Screenshot (natural closing) -->
    <div class="card" id="screenshot-card" style="display:none">
      <div class="card-title">Screenshot</div>
      <img id="screenshot-img" class="screenshot-img" style="display:none">
      <div id="screenshot-empty" class="empty-state" style="padding:30px;display:none">No screenshot</div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state">
      <div class="icon">&#9776;</div>
      <div>Select a recording or send a live prompt to begin</div>
    </div>
  </main>

<script>
// ===== Theme =====
function getPreferredTheme() {
  const stored = localStorage.getItem('dashboard-theme');
  if (stored) return stored;
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('theme-toggle');
  btn.textContent = theme === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
  btn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('dashboard-theme', next);
  applyTheme(next);
}

// Apply theme immediately
applyTheme(getPreferredTheme());

// ===== State =====
const BASE = location.origin;
let currentMode = 'history';
let liveEventSource = null;
let liveTriggerId = null;
let liveToolCount = 0;

// ===== Mode switching =====
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('history-controls').classList.toggle('active', mode === 'history');
  document.getElementById('live-controls').classList.toggle('active', mode === 'live');
  if (mode === 'live') {
    clearDisplay();
    document.getElementById('live-feed-card').style.display = '';
  } else {
    document.getElementById('live-feed-card').style.display = 'none';
    stopLive();
  }
}

// ===== History mode =====
async function refreshRecordings() {
  try {
    const res = await fetch(BASE + '/recordings');
    const list = await res.json();
    const select = document.getElementById('recording-select');
    select.innerHTML = '<option value="">-- select recording --</option>';
    const withEvents = list.filter(r => r.hasEvents);
    for (const rec of withEvents) {
      const opt = document.createElement('option');
      opt.value = rec.id;
      const d = new Date(rec.mtime);
      opt.textContent = rec.id + ' (' + d.toLocaleString() + ')';
      select.appendChild(opt);
    }
  } catch (e) {
    console.error('Failed to fetch recordings:', e);
  }
}

async function loadRecording(id) {
  if (!id) return;
  clearDisplay();
  try {
    const [eventsRes, metaRes] = await Promise.all([
      fetch(BASE + '/recordings/' + id + '/events'),
      fetch(BASE + '/recordings/' + id + '/meta'),
    ]);
    const events = await eventsRes.json();
    const meta = await metaRes.json();
    renderFull(id, events, meta);
  } catch (e) {
    console.error('Failed to load recording:', e);
  }
}

// ===== Live mode =====
async function sendLivePrompt() {
  const input = document.getElementById('live-prompt');
  const prompt = input.value.trim();
  if (!prompt) return;

  stopLive();
  clearDisplay();
  document.getElementById('live-feed-card').style.display = '';

  try {
    const res = await fetch(BASE + '/trigger', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });
    const data = await res.json();
    liveTriggerId = data.id;
    liveToolCount = 0;

    setLiveStatus('connected', 'Waiting for agent...');
    document.getElementById('live-send-btn').style.display = 'none';
    document.getElementById('live-stop-btn').style.display = '';

    // Subscribe to SSE
    liveEventSource = new EventSource(BASE + '/stream/' + liveTriggerId);

    liveEventSource.addEventListener('connected', () => {
      setLiveStatus('connected', 'Connected, waiting...');
    });

    liveEventSource.addEventListener('tool', (e) => {
      const ev = JSON.parse(e.data);
      setLiveStatus('running', 'Running... Tool #' + (ev.index || ''));
      appendLiveTool(ev);
    });

    liveEventSource.addEventListener('status', (e) => {
      const ev = JSON.parse(e.data);
      setLiveStatus('running', ev.message || 'Running...');
    });

    liveEventSource.addEventListener('iteration_start', (e) => {
      const ev = JSON.parse(e.data);
      setLiveStatus('running', 'Iteration ' + ev.iteration + '/' + (ev.maxIterations || '?'));
    });

    liveEventSource.addEventListener('tool_call', (e) => {
      const ev = JSON.parse(e.data);
      setLiveStatus('running', 'Calling: ' + (ev.toolCall?.name || ''));
      appendLiveTool({ index: ++liveToolCount, name: ev.toolCall?.name, status: 'running' });
    });

    liveEventSource.addEventListener('tool_result', (e) => {
      const ev = JSON.parse(e.data);
      updateLastLiveTool(ev.toolResult?.name, ev.toolResult?.success ? 'ok' : 'err', ev.toolResult?.durationMs);
    });

    liveEventSource.addEventListener('text_delta', (e) => {
      setLiveStatus('running', 'Generating text...');
    });

    liveEventSource.addEventListener('done', async (e) => {
      setLiveStatus('connected', 'Done! Loading results...');
      closeLiveStream();
      // Load full result
      try {
        const [eventsRes, metaRes] = await Promise.all([
          fetch(BASE + '/recordings/' + liveTriggerId + '/events'),
          fetch(BASE + '/recordings/' + liveTriggerId + '/meta'),
        ]);
        const events = await eventsRes.json();
        const meta = await metaRes.json();
        document.getElementById('live-feed-card').style.display = 'none';
        renderFull(liveTriggerId, events, meta);
        setLiveStatus('', 'Completed');
        // Also refresh recordings list
        refreshRecordings();
      } catch (err) {
        setLiveStatus('', 'Error loading results: ' + err.message);
      }
      document.getElementById('live-send-btn').style.display = '';
      document.getElementById('live-stop-btn').style.display = 'none';
    });

    liveEventSource.onerror = () => {
      setLiveStatus('', 'Disconnected');
    };
  } catch (e) {
    setLiveStatus('', 'Error: ' + e.message);
    document.getElementById('live-send-btn').style.display = '';
    document.getElementById('live-stop-btn').style.display = 'none';
  }
}

function stopLive() {
  closeLiveStream();
  setLiveStatus('', 'Idle');
  document.getElementById('live-send-btn').style.display = '';
  document.getElementById('live-stop-btn').style.display = 'none';
}

function closeLiveStream() {
  if (liveEventSource) {
    liveEventSource.close();
    liveEventSource = null;
  }
}

function setLiveStatus(state, text) {
  const dot = document.getElementById('live-dot');
  dot.className = 'live-dot' + (state ? ' ' + state : '');
  document.getElementById('live-status-text').textContent = text;
}

function appendLiveTool(ev) {
  const container = document.getElementById('live-tools');
  const item = document.createElement('div');
  item.className = 'live-tool-item';
  item.id = 'live-tool-' + (ev.index || liveToolCount);
  const statusClass = ev.status === 'running' ? '' : (ev.status === 'error' || ev.status === 'err' ? 'err' : 'ok');
  item.innerHTML = '<span class="dot ' + statusClass + '"></span>' +
    '<span class="tool-name">#' + (ev.index || '') + ' ' + (ev.name || '') + '</span>' +
    (ev.quality ? '<span style="color:#f59e0b;font-size:10px">' + ev.quality + '</span>' : '') +
    (ev.error ? '<span style="color:#ef4444;font-size:10px">' + ev.error + '</span>' : '') +
    (ev.status === 'running' ? '<span style="color:var(--text-muted);font-size:10px">running...</span>' : '');
  container.appendChild(item);
  container.scrollTop = container.scrollHeight;
}

function updateLastLiveTool(name, status, durationMs) {
  const items = document.querySelectorAll('.live-tool-item');
  const last = items[items.length - 1];
  if (!last) return;
  const dot = last.querySelector('.dot');
  if (dot) dot.className = 'dot ' + status;
  if (durationMs !== undefined) {
    last.innerHTML += '<span class="tool-dur" style="margin-left:auto">' + formatDuration(durationMs) + '</span>';
  }
}

// ===== Rendering =====
function clearDisplay() {
  document.getElementById('overview-card').style.display = 'none';
  document.getElementById('evlog-card').style.display = 'none';
  document.getElementById('finaltext-card').style.display = 'none';
  document.getElementById('screenshot-card').style.display = 'none';
  document.getElementById('live-feed-card').style.display = 'none';
  document.getElementById('empty-state').style.display = '';
  document.getElementById('live-tools').innerHTML = '';
  const evlogFeed = document.getElementById('evlog-feed');
  if (evlogFeed) evlogFeed.innerHTML = '';
  const thumb = document.getElementById('overview-thumb');
  if (thumb) { thumb.classList.add('hidden'); thumb.src = ''; }
  // Reset ID cross-reference state
  evlogLineage = { producers: new Map(), consumers: new Map() };
  clearEvlogHighlight();
}

function renderFull(id, events, meta) {
  document.getElementById('empty-state').style.display = 'none';
  renderOverview(id, events, meta);
  renderEventLog(id, events, meta);
  renderFooter(id, meta);
}

function renderOverview(id, events, meta) {
  const card = document.getElementById('overview-card');
  card.style.display = '';

  // Prompt
  const prompt = meta.conversationHistory?.[0]?.text || meta.logs?.match(/Prompt: "(.+?)"/)?.[1] || '(unknown)';
  const promptEl = document.getElementById('overview-prompt');
  promptEl.textContent = prompt;
  promptEl.classList.add('clamp');
  promptEl.onclick = () => promptEl.classList.toggle('clamp');

  // Stats — compact inline strip
  const s = meta.toolCallSummary || {};
  const iters = countIterations(meta.runtimeEvents || []);
  const parts = [];
  parts.push(statPair('model', meta.modelName || '?'));
  if (typeof s.total === 'number') parts.push(statPair('tools', s.total + (s.total === 1 ? ' tool' : ' tools')));
  if (typeof s.errors === 'number' && s.errors > 0) parts.push(statPair('errors', s.errors + (s.errors === 1 ? ' error' : ' errors')));
  if (iters > 0) parts.push(statPair('iterations', iters + (iters === 1 ? ' iteration' : ' iterations')));
  parts.push(statPair('duration', formatDuration(meta.durationMs)));
  if (meta.status) parts.push(statPair('', meta.status));
  document.getElementById('overview-stats').innerHTML = parts.join('<span class="stat-sep">·</span>');

  // Screenshot thumb on right — click jumps to full screenshot card
  const thumb = document.getElementById('overview-thumb');
  if (id) {
    thumb.src = BASE + '/recordings/' + id + '/screenshot';
    thumb.classList.remove('hidden');
    thumb.onerror = () => thumb.classList.add('hidden');
    thumb.onclick = () => {
      const card = document.getElementById('screenshot-card');
      if (card && card.style.display !== 'none') {
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    };
  } else {
    thumb.classList.add('hidden');
  }
}

function statPair(cls, value) {
  return '<span class="stat-val ' + escHtml(cls) + '">' + escHtml(value) + '</span>';
}

function countIterations(events) {
  let max = 0;
  for (const e of events) {
    if (e.iteration > max) max = e.iteration;
  }
  return max;
}

// ===== Footer (screenshot + final text) =====
function renderFooter(id, meta) {
  // Final text card
  const finalCard = document.getElementById('finaltext-card');
  const finalEl = document.getElementById('final-text');
  if (meta.finalText && meta.finalText.trim()) {
    finalEl.textContent = meta.finalText;
    finalCard.style.display = '';
  } else {
    finalEl.textContent = '';
    finalCard.style.display = 'none';
  }

  // Screenshot card
  const screenCard = document.getElementById('screenshot-card');
  const img = document.getElementById('screenshot-img');
  const emptyScreen = document.getElementById('screenshot-empty');
  if (id) {
    img.src = BASE + '/recordings/' + id + '/screenshot';
    img.style.display = '';
    emptyScreen.style.display = 'none';
    screenCard.style.display = '';
    img.onerror = function() {
      this.style.display = 'none';
      emptyScreen.style.display = '';
    };
  } else {
    screenCard.style.display = 'none';
  }
}

// ===== Event Log =====
let evlogState = {
  recordingId: null,
  rows: [],
  filters: { user: true, 'agent-text': true, 'tool-ok': true, 'tool-cap': true, 'tool-err': true, hook: true, 'turn-end': true },
  search: '',
  collapsed: {},
};

// Lineage index for ID cross-reference — rebuilt per recording load.
// producers: Map<nodeId, rowKey>                — rowKey = 'tool-<toolCallId>' (one producer per id)
// consumers: Map<nodeId, Array<rowKey>>          — excludes the producer row
let evlogLineage = { producers: new Map(), consumers: new Map() };
let evlogActiveId = null;

// Regex: Figma node id is "\d+:\d+" appearing as a bare token (word boundaries on both sides).
// Examples that should match: 1598:8044 · "1:2" · parentId:1598:8044
// Examples that should NOT match: version 1.2.3 · time 12:30 (contains non-digit neighbor, excluded by \b\d+:\d+\b)
const EVLOG_ID_REGEX = /\b(\d+:\d+)\b/g;

function evlogTruncate(str, max) {
  str = String(str == null ? '' : str);
  if (str.length <= max) return str;
  return str.slice(0, max) + '...';
}

function evlogShortArgs(args) {
  if (!args || typeof args !== 'object') return '';
  const keys = Object.keys(args).slice(0, 2);
  const parts = keys.map(k => {
    let v = args[k];
    if (typeof v === 'object' && v !== null) {
      try { v = JSON.stringify(v); } catch { v = '[obj]'; }
    }
    v = String(v == null ? '' : v);
    return k + ':' + evlogTruncate(v, 30);
  });
  const extra = Object.keys(args).length > keys.length ? ', ...' : '';
  return '{' + parts.join(', ') + extra + '}';
}

function evlogShortResult(raw) {
  if (!raw || typeof raw !== 'object') return '';
  const data = raw.data;
  if (data && typeof data === 'object' && data.id) return 'id:"' + data.id + '"';
  if (data && typeof data === 'object') {
    const keys = Object.keys(data).slice(0, 3);
    if (keys.length) return '{' + keys.join(',') + '}';
  }
  return '';
}

function buildEventRows(events, meta) {
  const rows = [];
  const byId = new Map();

  // 1. user prompt row (from meta)
  const userPrompt = (meta && (meta.userPrompt ||
    (meta.conversationHistory && meta.conversationHistory[0] && meta.conversationHistory[0].text))) || '';
  if (userPrompt) {
    rows.push({
      type: 'user',
      iteration: 1,
      id: 'user-0',
      preview: evlogTruncate(userPrompt, 120),
      raw: { source: 'meta.userPrompt', text: userPrompt },
      timestamp: (events[0] && events[0].timestamp) || null,
    });
  }

  // 2. accumulate text_delta per iteration
  const textByIter = new Map();

  for (const e of events) {
    if (!e || !e.type) continue;
    const iter = e.iteration || 1;

    if (e.type === 'text_delta') {
      if (!textByIter.has(iter)) {
        textByIter.set(iter, { text: '', timestamp: e.timestamp, raws: [] });
      }
      const acc = textByIter.get(iter);
      acc.text += (e.text || '');
      acc.raws.push(e);
      continue;
    }

    if (e.type === 'tool_call') {
      const tc = e.toolCall || {};
      byId.set(tc.id, { iter, call: e, result: null });
      continue;
    }

    if (e.type === 'tool_result') {
      const tr = e.toolResult || {};
      const entry = byId.get(tr.id);
      if (entry) entry.result = e;
      continue;
    }
  }

  // 3. walk events again in order to emit rows (preserve order, merge tool_call+result)
  const emittedTool = new Set();
  const emittedText = new Set();
  for (const e of events) {
    if (!e || !e.type) continue;
    const iter = e.iteration || 1;

    if (e.type === 'iteration_start') {
      // agent-text flush if present for previous iteration
      if (e.iteration > 1) {
        const prev = e.iteration - 1;
        if (textByIter.has(prev) && !emittedText.has(prev)) {
          const acc = textByIter.get(prev);
          if (acc.text.trim()) {
            rows.push({
              type: 'agent-text',
              iteration: prev,
              id: 'text-' + prev,
              preview: evlogTruncate(acc.text.trim(), 120),
              raw: { accumulated: acc.text, deltas: acc.raws.length },
              timestamp: acc.timestamp,
            });
          }
          emittedText.add(prev);
        }
      }
      continue;
    }

    if (e.type === 'tool_call') {
      const tc = e.toolCall || {};
      if (emittedTool.has(tc.id)) continue;
      emittedTool.add(tc.id);
      const entry = byId.get(tc.id) || { call: e, result: null };
      const tr = entry.result && entry.result.toolResult;
      const raw = tr && tr.raw;
      const toolName = tc.name || '?';
      const argsStr = evlogShortArgs(tc.args);
      let rowType = 'tool-ok';
      let preview = '';
      if (!tr) {
        // no result yet (partial recording)
        rowType = 'tool-ok';
        preview = toolName + '(' + argsStr + ') (pending)';
      } else if (raw && raw.error) {
        const code = raw.code || '';
        if (code === 'CAP_REJECT') {
          rowType = 'tool-cap';
          preview = toolName + '(' + argsStr + ') ✗ CAP_REJECT: ' + evlogTruncate(raw.error, 80);
        } else {
          rowType = 'tool-err';
          preview = toolName + '(' + argsStr + ') ✗ ' + evlogTruncate(raw.error, 80);
        }
      } else {
        rowType = 'tool-ok';
        const rstr = evlogShortResult(raw);
        preview = toolName + '(' + argsStr + ')' + (rstr ? ' → ' + rstr : '');
      }
      preview = evlogTruncate(preview, 140);
      rows.push({
        type: rowType,
        iteration: iter,
        id: 'tool-' + tc.id,
        preview,
        raw: { toolCall: tc, toolResult: tr || null },
        durationMs: tr ? tr.durationMs : null,
        timestamp: e.timestamp,
      });
      continue;
    }

    if (e.type === 'trigger_fired') {
      const hookId = e.hookId || e.trigger || '(hook)';
      const action = e.action || '?';
      const reason = e.reason || e.code || '';
      const preview = hookId + ' · ' + action + (reason ? ' · ' + evlogTruncate(reason, 80) : '');
      rows.push({
        type: 'hook',
        iteration: iter,
        id: 'hook-' + (e.sequence || rows.length),
        preview: evlogTruncate(preview, 180),
        raw: e,
        timestamp: e.timestamp,
      });
      continue;
    }

    if (e.type === 'turn_end') {
      // flush accumulated text for this iteration if not yet
      if (textByIter.has(iter) && !emittedText.has(iter)) {
        const acc = textByIter.get(iter);
        if (acc.text.trim()) {
          rows.push({
            type: 'agent-text',
            iteration: iter,
            id: 'text-' + iter,
            preview: evlogTruncate(acc.text.trim(), 120),
            raw: { accumulated: acc.text, deltas: acc.raws.length },
            timestamp: acc.timestamp,
          });
        }
        emittedText.add(iter);
      }
      const summary = e.summary || {};
      const totalIter = e.totalIterations || iter;
      const totalMs = summary.totalDurationMs || summary.durationMs;
      const preview = 'Turn ended — ' + totalIter + ' iterations' +
        (totalMs != null ? ' · ' + formatDuration(totalMs) : '') +
        (e.phase ? ' · ' + e.phase : '');
      rows.push({
        type: 'turn-end',
        iteration: iter,
        id: 'turn-' + iter,
        preview,
        raw: e,
        timestamp: e.timestamp,
      });
      continue;
    }
  }

  // Flush any remaining accumulated text (for last iteration without turn_end/iteration_start transition)
  for (const [iter, acc] of textByIter.entries()) {
    if (emittedText.has(iter)) continue;
    if (!acc.text.trim()) continue;
    rows.push({
      type: 'agent-text',
      iteration: iter,
      id: 'text-' + iter,
      preview: evlogTruncate(acc.text.trim(), 120),
      raw: { accumulated: acc.text, deltas: acc.raws.length },
      timestamp: acc.timestamp,
    });
    emittedText.add(iter);
  }

  // Sort rows by timestamp-then-iteration to keep chronological order where possible
  rows.sort((a, b) => {
    if (a.timestamp && b.timestamp && a.timestamp !== b.timestamp) return a.timestamp - b.timestamp;
    if (a.iteration !== b.iteration) return a.iteration - b.iteration;
    return 0;
  });

  return rows;
}

function evlogIconFor(type) {
  switch (type) {
    case 'user': return '\uD83D\uDCAC'; // 💬
    case 'agent-text': return '\uD83E\uDDE0'; // 🧠
    case 'tool-ok': return '\u26A1'; // ⚡
    case 'tool-cap': return '\u26A0'; // ⚠
    case 'tool-err': return '\u2717'; // ✗
    case 'hook': return '\uD83E\uDE9D'; // 🪝
    case 'turn-end': return '\u25A0'; // ■
    default: return '·';
  }
}

/**
 * Render inline LLM request summary for an iteration.
 * llmPairs: Array<{ req: llm_request event, resp: llm_response event | null }>
 */
function renderIterLLMBlock(llmPairs) {
  const parts = [];
  for (let i = 0; i < llmPairs.length; i++) {
    const { req, resp } = llmPairs[i];
    const msgCount = req.messageCount || (req.messages && req.messages.length) || 0;
    const toolCount = (req.toolNames && req.toolNames.length) || 0;
    const usage = (resp && resp.usage) || {};
    const thinking = (req.config && req.config.thinkingLevel) || '?';
    const durMs = resp && resp.durationMs;

    // Head line: callN · msgs · tools · prompt tok · cached · think · duration
    const head = [];
    head.push('LLM Request' + (llmPairs.length > 1 ? ' #' + (i + 1) : ''));
    head.push(msgCount + ' msg' + (msgCount === 1 ? '' : 's'));
    head.push(toolCount + ' tool' + (toolCount === 1 ? '' : 's'));
    if (usage.promptTokens != null) {
      let tok = usage.promptTokens + ' prompt tok';
      if (usage.cachedTokens) tok += ' (' + usage.cachedTokens + ' cached)';
      head.push(tok);
    }
    head.push('think=' + escHtml(String(thinking)));
    if (durMs != null) head.push(formatDuration(durMs));

    parts.push('<div class="evlog-iter-llm-head">' + head.map(escHtml).join(' \u00b7 ') + '</div>');

    if (req.messages && req.messages.length > 0) {
      parts.push('<div class="evlog-iter-llm-msgs">');
      for (const m of req.messages) {
        const role = String(m.role || '?');
        const roleCls = role === 'system' ? 'system'
          : role === 'user' ? 'user'
          : role === 'model' || role === 'assistant' ? 'model'
          : role === 'tool' ? 'tool'
          : '';
        const flags = [];
        if (m.pinned) flags.push('\uD83D\uDCCC'); // 📌
        if (m.hidden) flags.push('hidden');
        parts.push('<div class="evlog-iter-llm-msg">' +
          '<span class="evlog-iter-llm-role ' + roleCls + '">' + escHtml(role) + '</span>' +
          '<span class="evlog-iter-llm-len">' + (m.contentLength || 0) + ' chars</span>' +
          (flags.length ? '<span class="evlog-iter-llm-flag">' + escHtml(flags.join(' ')) + '</span>' : '') +
        '</div>');
      }
      parts.push('</div>');
    }
  }
  return parts.join('');
}

/**
 * Build two lineage maps from tool rows:
 *  - producers[nodeId]  = rowKey of the FIRST row whose tool_result produced this id
 *  - consumers[nodeId]  = [rowKey, ...] of rows whose tool_call args reference this id (excluding the producer)
 *
 * Producer detection walks tool_result.raw.data recursively looking for:
 *   - .id (string matching /^\d+:\d+$/)
 *   - .idMap values (object) — every value that matches the id pattern
 *   - any string value in data that matches the id pattern (catch-all for nested fields like .nodeId, .rootId)
 *
 * Consumer detection walks tool_call.args recursively and collects any string value matching the id pattern.
 */
function buildLineageIndex(rows) {
  const producers = new Map();
  const consumers = new Map();
  const ID_SHAPE = /^\d+:\d+$/;

  // Collect every id string found anywhere in a value graph (handles nested objects + arrays).
  function collectIds(val, out) {
    if (val == null) return;
    if (typeof val === 'string') {
      if (ID_SHAPE.test(val)) out.add(val);
      return;
    }
    if (typeof val !== 'object') return;
    if (Array.isArray(val)) {
      for (const v of val) collectIds(v, out);
      return;
    }
    for (const k of Object.keys(val)) collectIds(val[k], out);
  }

  for (const row of rows) {
    if (!row || !row.raw) continue;
    const rowKey = row.id;

    // Producer side — only tool-ok rows with a toolResult.raw.data
    const tr = row.raw && row.raw.toolResult;
    const data = tr && tr.raw && tr.raw.data;
    if (data) {
      const produced = new Set();
      collectIds(data, produced);
      for (const nodeId of produced) {
        if (!producers.has(nodeId)) producers.set(nodeId, rowKey);
      }
    }

    // Consumer side — tool_call args
    const tc = row.raw && row.raw.toolCall;
    const args = tc && tc.args;
    if (args) {
      const consumed = new Set();
      collectIds(args, consumed);
      for (const nodeId of consumed) {
        // exclude the row itself (a row producing X shouldn't also list itself as consumer of X)
        if (producers.get(nodeId) === rowKey) continue;
        if (!consumers.has(nodeId)) consumers.set(nodeId, []);
        const arr = consumers.get(nodeId);
        if (arr[arr.length - 1] !== rowKey) arr.push(rowKey);
      }
    }
  }

  return { producers, consumers };
}

/**
 * Wrap any Figma node id (shape \d+:\d+ with word boundaries) in an escaped-HTML string
 * with a clickable span. Must operate on ALREADY-ESCAPED HTML so that angle brackets from
 * the wrapper template aren't themselves escaped.
 */
function evlogWrapIdRefs(escapedHtml) {
  if (!escapedHtml) return escapedHtml;
  return escapedHtml.replace(EVLOG_ID_REGEX, function(_m, id) {
    return '<span class="evlog-id-ref" data-id="' + id + '">' + id + '</span>';
  });
}

function setEvlogHighlight(nodeId) {
  evlogActiveId = nodeId;
  const producerKey = evlogLineage.producers.get(nodeId);
  const consumerKeys = evlogLineage.consumers.get(nodeId) || [];

  // Clear previous highlight classes
  document.querySelectorAll('#evlog-feed .evlog-row.evlog-id-highlight, #evlog-feed .evlog-row.evlog-id-highlight-producer').forEach(r => {
    r.classList.remove('evlog-id-highlight');
    r.classList.remove('evlog-id-highlight-producer');
  });
  document.querySelectorAll('#evlog-feed .evlog-id-ref.active').forEach(s => s.classList.remove('active'));

  // Apply producer class
  let producerRow = null;
  if (producerKey) {
    producerRow = document.querySelector('#evlog-feed .evlog-row[data-row-key="' + producerKey + '"]');
    if (producerRow) producerRow.classList.add('evlog-id-highlight-producer');
  }
  // Apply consumer class
  for (const key of consumerKeys) {
    const r = document.querySelector('#evlog-feed .evlog-row[data-row-key="' + key + '"]');
    if (r) r.classList.add('evlog-id-highlight');
  }
  // Emphasize the matching id spans across the whole feed
  document.querySelectorAll('#evlog-feed .evlog-id-ref[data-id="' + nodeId + '"]').forEach(s => s.classList.add('active'));

  // Banner
  const banner = document.getElementById('evlog-id-banner');
  const idEl = document.getElementById('evlog-id-banner-id');
  const metaEl = document.getElementById('evlog-id-banner-meta');
  if (banner && idEl && metaEl) {
    idEl.textContent = nodeId;
    const nConsumers = consumerKeys.length;
    const producerLabel = producerKey
      ? 'producer: ' + evlogProducerLabel(producerKey)
      : 'producer: not found';
    metaEl.textContent = producerLabel + ' \u00b7 ' + nConsumers + ' consumer' + (nConsumers === 1 ? '' : 's');
    banner.style.display = '';
  }

  // Scroll producer row into view (or first consumer if no producer)
  const focusRow = producerRow
    || (consumerKeys.length ? document.querySelector('#evlog-feed .evlog-row[data-row-key="' + consumerKeys[0] + '"]') : null);
  if (focusRow) {
    try { focusRow.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch {}
  }
}

function evlogProducerLabel(rowKey) {
  // Find the row and return a short label like "iter 2"
  const row = document.querySelector('#evlog-feed .evlog-row[data-row-key="' + rowKey + '"]');
  if (!row) return rowKey;
  const iter = row.dataset.iter || '?';
  return 'iter ' + iter;
}

function clearEvlogHighlight() {
  evlogActiveId = null;
  document.querySelectorAll('#evlog-feed .evlog-row.evlog-id-highlight, #evlog-feed .evlog-row.evlog-id-highlight-producer').forEach(r => {
    r.classList.remove('evlog-id-highlight');
    r.classList.remove('evlog-id-highlight-producer');
  });
  document.querySelectorAll('#evlog-feed .evlog-id-ref.active').forEach(s => s.classList.remove('active'));
  const banner = document.getElementById('evlog-id-banner');
  if (banner) banner.style.display = 'none';
}

function renderEventLog(id, events, meta) {
  const card = document.getElementById('evlog-card');
  const feed = document.getElementById('evlog-feed');
  if (!card || !feed) return;
  feed.innerHTML = '';
  evlogState.recordingId = id;
  evlogState.rows = buildEventRows(events || [], meta || {});

  // Build the lineage index once for this recording.
  evlogLineage = buildLineageIndex(evlogState.rows);
  clearEvlogHighlight();

  // Restore collapse state from localStorage
  let collapsed = {};
  try {
    const stored = localStorage.getItem('evlog-collapsed-' + id);
    if (stored) collapsed = JSON.parse(stored) || {};
  } catch {}
  evlogState.collapsed = collapsed;

  // Index llm_request / llm_response per iteration (for inline iteration [llm] expansion)
  const llmByIter = new Map();
  const llmRespByCallId = new Map();
  for (const e of events || []) {
    if (!e || !e.type) continue;
    if (e.type === 'llm_response' && e.llmCallId) llmRespByCallId.set(e.llmCallId, e);
  }
  for (const e of events || []) {
    if (!e || !e.type) continue;
    if (e.type === 'llm_request') {
      const iter = e.iteration || 1;
      if (!llmByIter.has(iter)) llmByIter.set(iter, []);
      llmByIter.get(iter).push({ req: e, resp: e.llmCallId ? llmRespByCallId.get(e.llmCallId) : null });
    }
  }

  // Group rows by iteration, preserving order
  const iterOrder = [];
  const iterMap = new Map();
  for (const r of evlogState.rows) {
    if (!iterMap.has(r.iteration)) {
      iterMap.set(r.iteration, []);
      iterOrder.push(r.iteration);
    }
    iterMap.get(r.iteration).push(r);
  }

  if (iterOrder.length === 0) {
    feed.innerHTML = '<div class="evlog-empty">No runtime events recorded.</div>';
    card.style.display = '';
    return;
  }

  for (const iter of iterOrder) {
    const sep = document.createElement('div');
    sep.className = 'evlog-iter-sep' + (evlogState.collapsed[iter] ? ' folded' : '');
    sep.dataset.iter = String(iter);
    const rowsForIter = iterMap.get(iter);
    const llmPairs = llmByIter.get(iter) || [];
    const hasLLM = llmPairs.length > 0;
    sep.innerHTML = '<span class="evlog-iter-toggle">\u25BE</span>' +
      '<span>Iteration ' + iter + '</span>' +
      (hasLLM ? '<button class="evlog-iter-llm-btn" type="button" data-iter="' + iter + '">llm</button>' : '') +
      '<span class="evlog-iter-count">' + rowsForIter.length + ' events</span>';
    sep.addEventListener('click', (ev) => {
      // If the llm button was clicked, don't toggle fold
      if (ev.target && ev.target.classList && ev.target.classList.contains('evlog-iter-llm-btn')) return;
      toggleIterationFold(iter);
    });
    feed.appendChild(sep);

    // Inline LLM expansion block (hidden by default)
    if (hasLLM) {
      const llmBlock = document.createElement('div');
      llmBlock.className = 'evlog-iter-llm-block';
      llmBlock.dataset.iter = String(iter);
      llmBlock.style.display = 'none';
      llmBlock.innerHTML = renderIterLLMBlock(llmPairs);
      feed.appendChild(llmBlock);
      // Wire up the button
      const btn = sep.querySelector('.evlog-iter-llm-btn');
      if (btn) {
        btn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const open = llmBlock.style.display !== 'none';
          llmBlock.style.display = open ? 'none' : '';
          btn.classList.toggle('active', !open);
        });
      }
    }

    for (const row of rowsForIter) {
      const line = document.createElement('div');
      line.className = 'evlog-row';
      line.dataset.type = row.type;
      line.dataset.iter = String(iter);
      line.dataset.rowKey = row.id;
      line.dataset.preview = (row.preview || '').toLowerCase();
      if (evlogState.collapsed[iter]) line.style.display = 'none';

      const durText = row.durationMs != null ? formatDuration(row.durationMs) : '';
      const previewHtml = evlogWrapIdRefs(escHtml(row.preview || ''));
      line.innerHTML =
        '<span class="evlog-icon">' + escHtml(evlogIconFor(row.type)) + '</span>' +
        '<span class="evlog-iter-badge">i' + iter + '</span>' +
        '<span class="evlog-type-chip" data-type="' + row.type + '">' + row.type + '</span>' +
        '<span class="evlog-preview">' + previewHtml + '</span>' +
        (durText ? '<span class="evlog-dur">' + escHtml(durText) + '</span>' : '');

      const raw = document.createElement('pre');
      raw.className = 'evlog-raw';
      let rawStr;
      try { rawStr = JSON.stringify(row.raw, null, 2); }
      catch { rawStr = String(row.raw); }
      // Escape first, then wrap id refs — keeps <, >, & safe while the wrap template's own <>
      // survive because it's injected post-escape.
      raw.innerHTML = evlogWrapIdRefs(escHtml(rawStr));
      if (evlogState.collapsed[iter]) raw.style.display = 'none';

      line.addEventListener('click', () => {
        raw.classList.toggle('open');
      });
      feed.appendChild(line);
      feed.appendChild(raw);
    }
  }

  bindEventLogControls();
  bindEvlogIdRefs();
  applyEventLogFilters();
  card.style.display = '';
}

let evlogIdRefsBound = false;
function bindEvlogIdRefs() {
  if (evlogIdRefsBound) return;
  evlogIdRefsBound = true;

  const feed = document.getElementById('evlog-feed');
  if (feed) {
    // Delegated handler — captures every .evlog-id-ref click inside the feed (preview or raw pre)
    feed.addEventListener('click', (ev) => {
      const target = ev.target;
      if (!target || !target.classList || !target.classList.contains('evlog-id-ref')) return;
      // Don't let the row-expand click fire
      ev.stopPropagation();
      ev.preventDefault();
      const nodeId = target.dataset.id;
      if (!nodeId) return;
      if (evlogActiveId === nodeId) {
        clearEvlogHighlight();
      } else {
        setEvlogHighlight(nodeId);
      }
    });
  }

  const closeBtn = document.getElementById('evlog-id-banner-close');
  if (closeBtn) {
    closeBtn.addEventListener('click', (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      clearEvlogHighlight();
    });
  }
}

let evlogControlsBound = false;
function bindEventLogControls() {
  if (evlogControlsBound) return;
  evlogControlsBound = true;

  document.querySelectorAll('#evlog-toolbar input[data-evlog-type]').forEach(cb => {
    cb.addEventListener('change', () => {
      const t = cb.dataset.evlogType;
      evlogState.filters[t] = cb.checked;
      // tool-err checkbox also controls tool-cap (single "tool-err" type chip covers both error variants)
      if (t === 'tool-err') evlogState.filters['tool-cap'] = cb.checked;
      applyEventLogFilters();
    });
  });

  const search = document.getElementById('evlog-search');
  if (search) {
    search.addEventListener('input', () => {
      evlogState.search = search.value.trim().toLowerCase();
      applyEventLogFilters();
    });
  }

  const onlyErrors = document.getElementById('evlog-only-errors');
  if (onlyErrors) {
    onlyErrors.addEventListener('click', () => {
      for (const k of Object.keys(evlogState.filters)) {
        evlogState.filters[k] = (k === 'tool-err' || k === 'tool-cap');
      }
      syncEvlogCheckboxes();
      applyEventLogFilters();
    });
  }

  const onlyHooks = document.getElementById('evlog-only-hooks');
  if (onlyHooks) {
    onlyHooks.addEventListener('click', () => {
      for (const k of Object.keys(evlogState.filters)) {
        evlogState.filters[k] = (k === 'hook');
      }
      syncEvlogCheckboxes();
      applyEventLogFilters();
    });
  }

  const reset = document.getElementById('evlog-reset');
  if (reset) {
    reset.addEventListener('click', () => {
      for (const k of Object.keys(evlogState.filters)) evlogState.filters[k] = true;
      evlogState.search = '';
      const sbox = document.getElementById('evlog-search');
      if (sbox) sbox.value = '';
      syncEvlogCheckboxes();
      applyEventLogFilters();
    });
  }
}

function syncEvlogCheckboxes() {
  document.querySelectorAll('#evlog-toolbar input[data-evlog-type]').forEach(cb => {
    const t = cb.dataset.evlogType;
    cb.checked = !!evlogState.filters[t];
  });
}

function applyEventLogFilters() {
  // Iteration LLM blocks: hide when iteration is folded, otherwise respect last toggled state
  document.querySelectorAll('#evlog-feed .evlog-iter-llm-block').forEach(block => {
    const iter = block.dataset.iter;
    const folded = !!evlogState.collapsed[iter];
    if (folded) block.style.display = 'none';
    // When unfolded, leave current display (button controls it)
  });

  const rows = document.querySelectorAll('#evlog-feed .evlog-row');
  const search = evlogState.search;
  rows.forEach(row => {
    const type = row.dataset.type;
    const iter = row.dataset.iter;
    const typeOk = !!evlogState.filters[type];
    const searchOk = !search || (row.dataset.preview || '').indexOf(search) !== -1;
    const folded = !!evlogState.collapsed[iter];
    const visible = typeOk && searchOk && !folded;
    row.style.display = visible ? '' : 'none';
    const raw = row.nextElementSibling;
    if (raw && raw.classList && raw.classList.contains('evlog-raw')) {
      if (!visible) {
        raw.classList.remove('open');
        raw.style.display = 'none';
      } else {
        raw.style.display = '';
      }
    }
  });
}

function toggleIterationFold(iter) {
  const key = String(iter);
  evlogState.collapsed[iter] = !evlogState.collapsed[iter];
  const sep = document.querySelector('#evlog-feed .evlog-iter-sep[data-iter="' + key + '"]');
  if (sep) sep.classList.toggle('folded', !!evlogState.collapsed[iter]);
  applyEventLogFilters();
  // persist
  if (evlogState.recordingId) {
    try {
      localStorage.setItem(
        'evlog-collapsed-' + evlogState.recordingId,
        JSON.stringify(evlogState.collapsed),
      );
    } catch {}
  }
}

// ===== Helpers =====
function formatDuration(ms) {
  if (ms === undefined || ms === null) return '?';
  if (ms >= 1000) return (ms / 1000).toFixed(1) + 's';
  return ms + 'ms';
}

function escHtml(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ===== Init =====
refreshRecordings();
</script>
</body>
